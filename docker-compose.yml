version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: prept-postgres
    environment:
      POSTGRES_DB: prepttracker
      POSTGRES_USER: preptuser
      POSTGRES_PASSWORD: preptpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U preptuser -d prepttracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prept-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: prept-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@prept.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - prept-network

  discovery-server:
    build:
      context: ../prep-tracker-discovery-server
      dockerfile: Dockerfile
    container_name: prept-discovery-server
    environment:
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    ports:
      - "8761:8761"
    networks:
      - prept-network

  api-gateway:
    build:
      context: ../prep-tracker-api-gateway
      dockerfile: Dockerfile
    container_name: prept-api-gateway
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    ports:
      - "8000:8000"
    depends_on:
      - discovery-server
    networks:
      - prept-network

  user-service:
    build:
      context: ..
      dockerfile: prep-tracker-user-service/Dockerfile
    container_name: prept-user-service
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/prepttracker?currentSchema=prept_user
      DATABASE_USER: preptuser
      DATABASE_PASSWORD: preptpass
      EUREKA_URL: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - prept-network

  tracker-service:
    build:
      context: ..
      dockerfile: prep-tracker-tracker-service/Dockerfile
    container_name: prept-tracker-service
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/prepttracker?currentSchema=prept_tracker
      DATABASE_USER: preptuser
      DATABASE_PASSWORD: preptpass
      EUREKA_URL: http://discovery-server:8761/eureka/
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - prept-network

  notification-service:
    build:
      context: ..
      dockerfile: prep-tracker-notification-service/Dockerfile
    container_name: prept-notification-service
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/prepttracker?currentSchema=prept_notification
      DATABASE_USER: preptuser
      DATABASE_PASSWORD: preptpass
      EUREKA_URL: http://discovery-server:8761/eureka/
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - prept-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: prept-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - prept-network

  frontend:
    build:
      context: ../prep-tracker-frontend
      dockerfile: Dockerfile
    container_name: prept-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - prept-network

volumes:
  postgres_data:

networks:
  prept-network:
    driver: bridge
